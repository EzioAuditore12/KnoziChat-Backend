syntax = "proto3";

package ai;

service AIService {
  rpc AskAI (AIRequest) returns (AIResponse);
  rpc ProcessQuery (ProcessQueryRequest) returns (stream ProcessQueryResponse);
  rpc EmbedMessage (EmbedMessageRequest) returns (EmbedMessageResponse);
  rpc SeedChats (SeedChatsRequest) returns (SeedChatsResponse);
}

message AIRequest {
  string prompt = 1;
}

message AIResponse {
  string response = 1;
}

message ChatMessage {
  string username = 1;
  string message = 2;
  string created_at = 3;
}

message GroupDetails {
  int64 group_id = 1;
  string group_name = 2;
}

message ProcessQueryRequest {
  GroupDetails group = 1;
  repeated ChatMessage chats = 2;
  string query = 3;
  string user_id = 4;
  string username = 5;
}

message ProcessQueryResponse {
  string response = 1;
}

message EmbedMessageRequest {
  string message_id = 1;
  string conversation_id = 2;
  string sender_id = 3;
  string content = 4;
  string created_at = 5;
  bool is_group = 6;
}

message EmbedMessageResponse {
  bool success = 1;
  string error = 2;
}

message SeedChatsRequest {
  string conversation_id = 1;
  bool is_group = 2;
  repeated ChatMessage chats = 3;
}

message SeedChatsResponse {
  bool success = 1;
  string message = 2;
}