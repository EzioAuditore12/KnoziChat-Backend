version: '3.8'

services:
  # 1. Main NestJS Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_POSTGRE_URL=postgresql://postgres:postgres@postgres:5432/knozichat
      - DATABASE_MONGODB_URL=mongodb://mongo:27017/knozichat
      - REDIS_URL=redis://redis:6379
      # Map the AI service to the docker internal network
      - AI_PACKAGE_URL=ai-service:50051
      # IMPORTANT: Provide your other secrets below or use a .env file
      - JWT_SECRET=${JWT_SECRET:-default_secret}
      - JWT_EXPIRE_IN=${JWT_EXPIRE_IN:-15m}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
      ai-service:
        condition: service_started
    networks:
      - knozichat-net

  # 2. Python AI gRPC Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE_NAME=knozichat
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      # IMPORTANT: Pass Gemini API Key from your host environment
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_LLM_MODEL=gemini-2.5-flash
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knozichat-net

  # 3. PostgreSQL + pgvector Extension
  postgres:
    image: ankane/pgvector:latest # Pre-packaged postgres with pgvector
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=knozichat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - knozichat-net

  # 4. MongoDB
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - knozichat-net

  # 5. Redis (BullMQ / Caching)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - knozichat-net

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  knozichat-net:
    driver: bridge
